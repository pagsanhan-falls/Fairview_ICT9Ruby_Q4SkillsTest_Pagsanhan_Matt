<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4_SW#1</title>
    <link href="https://fonts.googleapis.com/css2?family=Edu+AU+VIC+WA+NT+Hand:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-image: url('https://cdn.discordapp.com/attachments/1463431198704537657/1504376935835373649/output_1.jpg?ex=6a06c3b3&is=6a057233&hm=cddf473e375d1c9d30a8f3c93ebc697469170fcd2af6ae7ad4a99a06513aacfd&');
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    .container {
        max-width: 550px;
        margin: 120px auto;
        background-color: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    img {
        width: 160px;
        height: auto;
        display: block;
        margin: 0 auto;
    }

    .bum {
        text-align: center;
        font-size: 55px;
        color: #4a3b4a; 
        margin-bottom: 10px;
        font-family: "Edu AU VIC WA NT Hand", cursive;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #5a4a5a;
    }

    .btn-info {
        background-color: #ff99cc !important;
        border: none !important;
        color: white !important;
    }

    .btn-secondary {
        background-color: #f8f9fa !important;
        color: #666 !important;
        border: 1px solid #ddd !important;
    }

    #cooldiv {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }
</style>
</head>
<body>

<div class="container" id="cooldiv">
    <img src="https://i.pinimg.com/originals/7a/61/c7/7a61c711ee4f1043b2b52839b0a4c30d.gif">
    
    <h1 class="bum">Ouran Highschool</h1>
    <h5 style="color: #888;">Login</h5>

    <form style="width: 100%;">
        <label>Highschool ID</label>
        <input type="text" id="highschool-id" class="form-control" placeholder="Email or Username">
        <br>  

        <label>Password</label>
        <input type="password" id="fancy-tuna" class="form-control" placeholder="SecretPassword">
        <br> 
        
        <div class="d-flex gap-2">
            <input type="button" value="Login" class="btn btn-info rounded-5 w-100" onclick="authenticate()">
            <input type="reset" value="Cancel" class="btn btn-secondary rounded-5 w-100">
        </div>
    </form>
</div>

<script>
    function authenticate(){
        let user = document.getElementById("highschool-id").value;
        let pass = document.getElementById("fancy-tuna").value;

        if (user === "Haruhi Fujioka" && pass === "Tamaki") {
            alert("Correct! Welcome " + user);
        } else {
            alert("Incrorrect, Please try again");
        }
    }
</script>

</body>
</html>
